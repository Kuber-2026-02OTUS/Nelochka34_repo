global:
  nodeSelector:
    role: infra

  tolerations:
    - key: "dedicated"
      operator: "Equal"
      value: "infra"
      effect: "NoSchedule"

    - key: "node-role"
      operator: "Equal"
      value: "infra"
      effect: "NoSchedule"

configs:
  params:
    server.insecure: true

server:
  service:
    type: ClusterIP