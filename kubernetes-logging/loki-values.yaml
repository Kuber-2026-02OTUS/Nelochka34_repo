loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  storage:
    type: s3
    s3:
      endpoint: storage.yandexcloud.net
      region: ru-central1
      bucketnames: loki-logs-bucket-nela
      access_key_id: XXX
      secret_access_key: YYYY
      s3forcepathstyle: true

  schemaConfig:
    configs:
      - from: 2024-01-01
        store: boltdb-shipper
        object_store: s3
        schema: v11
        index:
          prefix: index_
          period: 24h

  limits_config:
    retention_period: 168h

  nodeSelector:
    role: infra

  tolerations:
    - key: "dedicated"
      operator: "Equal"
      value: "infra"
      effect: "NoSchedule"
    - key: "node-role"
      operator: "Equal"
      value: "infra"
      effect: "NoSchedule"

promtail:
  enabled: true

  tolerations:
    - key: "dedicated"
      operator: "Equal"
      value: "infra"
      effect: "NoSchedule"
    - key: "node-role"
      operator: "Equal"
      value: "infra"
      effect: "NoSchedule"

grafana:
  enabled: false