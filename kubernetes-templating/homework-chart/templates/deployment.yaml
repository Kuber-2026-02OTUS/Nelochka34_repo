apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-deployment
  namespace: {{ .Values.namespace }}

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: {{ .Release.Name }}

  template:
    metadata:
      labels:
        app: {{ .Release.Name }}

    spec:
      volumes:
        - name: shared-storage
          emptyDir: {}

      initContainers:
        - name: init-content
          image: "{{ .Values.initContainer.image.repository }}:{{ .Values.initContainer.image.tag }}"
          command: ['sh', '-c', 'echo "<h1>Privet from Init Container!</h1>" > /init/index.html']
          volumeMounts:
            - name: shared-storage
              mountPath: /init

      containers:
        - name: web-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ['python', '-m', 'http.server', '8000', '--directory', '/homework']

          ports:
            - containerPort: 8000

          volumeMounts:
            - name: shared-storage
              mountPath: /homework

          {{- if .Values.probes.enabled }}
          readinessProbe:
            httpGet:
              path: /index.html
              port: 8000
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
          {{- end }}

          lifecycle:
            preStop:
              exec:
                command: ["rm", "-f", "/homework/index.html"]