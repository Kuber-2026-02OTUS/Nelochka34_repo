# kafka-values.yaml — гарантированно рабочая конфигурация для KRaft + PLAINTEXT

image:
  registry: docker.io
  repository: bitnamilegacy/kafka
  tag: 3.9.0-debian-12-r5
  pullPolicy: IfNotPresent

# 🔑 KRaft: явные переменные окружения для КОНТРОЛЛЕРА
controller:
  replicaCount: 1
  resourcesPreset: "small"
  jvmHeapSize: 256m
  
  # 👇 Ключевое: передаём Kafka-конфигу напрямую
  extraEnvVars:
    - name: KAFKA_CFG_PROCESS_ROLES
      value: "controller,broker"  # Контроллер + брокер в одном поде (для минимальной конфигурации)
    - name: KAFKA_CFG_NODE_ID
      value: "0"
    - name: KAFKA_CFG_CONTROLLER_QUORUM_VOTERS
      value: "0@kafka-dev-controller-0.kafka-dev-headless.dev.svc.cluster.local:9093"
    - name: KAFKA_CFG_CLUSTER_ID
      value: "ChcVvNqyRk2aB7xJZ9mK1Q"  # ✅ Зафиксируйте этот UUID
    - name: KAFKA_CFG_LISTENERS
      value: "PLAINTEXT://:9092,CONTROLLER://:9093"
    - name: KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP
      value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
    - name: KAFKA_CFG_INTER_BROKER_LISTENER_NAME
      value: "PLAINTEXT"
    - name: KAFKA_CFG_CONTROLLER_LISTENER_NAMES
      value: "CONTROLLER"

# 🔑 Для брокера (если отделён от контроллера)
broker:
  replicaCount: 1
  resourcesPreset: "small"
  jvmHeapSize: 256m
  extraEnvVars:
    - name: KAFKA_CFG_PROCESS_ROLES
      value: "broker"
    - name: KAFKA_CFG_NODE_ID
      value: "1"
    - name: KAFKA_CFG_CONTROLLER_QUORUM_VOTERS
      value: "0@kafka-dev-controller-0.kafka-dev-headless.dev.svc.cluster.local:9093"
    - name: KAFKA_CFG_CLUSTER_ID
      value: "ChcVvNqyRk2aB7xJZ9mK1Q"

# 🔓 Протоколы
listeners:
  client:
    protocol: PLAINTEXT
    containerPort: 9092
  controller:
    protocol: PLAINTEXT
    containerPort: 9093
  interbroker:
    protocol: PLAINTEXT
    containerPort: 9094
  external:
    protocol: PLAINTEXT
    enabled: false

# 🗑️ Отключаем persistence для теста
persistence:
  enabled: false

metrics:
  jmx:
    enabled: false

service:
  type: ClusterIP