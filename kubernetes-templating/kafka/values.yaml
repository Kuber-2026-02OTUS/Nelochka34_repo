replicaCount: 5

image:
  repository: bitnamilegacy/kafka
  tag: 3.5.2-debian-12-r30
  pullPolicy: IfNotPresent

auth:
  enabled: true
  clientProtocol: SASL_PLAINTEXT
  interBrokerProtocol: SASL_PLAINTEXT

kraft:
  enabled: true
  controller:
    replicas: 3
    persistence:
      enabled: false

broker:
  persistence:
    enabled: false

persistence:
  enabled: false

zookeeper:
  enabled: false

serviceAccount:
  create: false

rbac:
  create: false