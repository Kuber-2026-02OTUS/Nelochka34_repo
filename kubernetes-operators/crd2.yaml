apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition

metadata:
  name: mysqls.otus.homework

spec:
  group: otus.homework
  scope: Namespaced

  names:
    plural: mysqls
    singular: mysql
    kind: MySQL

  versions:
    - name: v1
      served: true
      storage: true

      schema:
        openAPIV3Schema:
          type: object

          properties:
            spec:
              type: object

              required:
                - image
                - database
                - password
                - storage_size

              properties:
                image:
                  type: string
                  description: "Docker image for MySQL"

                database:
                  type: string
                  description: "Database name"

                password:
                  type: string
                  description: "Root password"

                storage_size:
                  type: string
                  description: "Storage size (e.g. 1Gi)"