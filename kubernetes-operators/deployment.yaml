apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-operator
  namespace: default

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mysql-operator

  template:
    metadata:
      labels:
        app: mysql-operator

    spec:
      serviceAccountName: mysql-sa

      containers:
        - name: mysql-operator
          image: roflmaoinmysoul/mysql-operator:1.0.0
          imagePullPolicy: IfNotPresent